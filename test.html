<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SAM Regression Tests</title>
<style>
  body { font-family: system-ui, sans-serif; margin: 0; background: #f5f5f7; color: #1d1d1f; }
  header { background: #1d1d1f; color: #fff; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; }
  header h1 { margin: 0; font-size: 18px; }
  #summary { padding: 16px 24px; background: #fff; border-bottom: 1px solid #d2d2d7; display: flex; gap: 24px; align-items: center; }
  .stat { font-size: 14px; }
  .stat span { font-weight: 700; font-size: 20px; display: block; }
  .pass-count { color: #1a7f37; }
  .fail-count { color: #c62828; }
  #results { padding: 24px; display: flex; flex-direction: column; gap: 20px; }
  .suite { background: #fff; border-radius: 8px; border: 1px solid #d2d2d7; overflow: hidden; }
  .suite-header { padding: 10px 16px; font-weight: 700; font-size: 14px; background: #dbeafe; border-bottom: 1px solid #d2d2d7; display: flex; justify-content: space-between; }
  .test { display: flex; gap: 12px; padding: 8px 16px; border-bottom: 1px solid #f0f0f2; font-size: 13px; align-items: flex-start; }
  .test:last-child { border-bottom: none; }
  .test.pass .icon::before { content: '✓'; color: #1a7f37; font-weight: 700; }
  .test.fail .icon::before { content: '✗'; color: #c62828; font-weight: 700; }
  .test-name { flex: 1; }
  .test-detail { font-size: 11px; color: #6e6e73; margin-top: 2px; font-family: monospace; }
  .test.fail .test-detail { color: #c62828; }
  button { background: #0071e3; color: #fff; border: none; border-radius: 6px; padding: 8px 18px; font-size: 13px; cursor: pointer; }
  button:hover { background: #0077ed; }
</style>
</head>
<body>
<header>
  <h1>Silent Auction Manager — Regression Tests</h1>
  <div style="display:flex;gap:8px;">
    <button onclick="runAll()">▶ Run All</button>
    <button onclick="window.close()" style="background:#c62828;">✕ Close</button>
  </div>
</header>
<div id="summary">
  <div class="stat"><span id="s-pass" class="pass-count">—</span>Passed</div>
  <div class="stat"><span id="s-fail" class="fail-count">—</span>Failed</div>
  <div class="stat"><span id="s-total">—</span>Total</div>
  <div class="stat" id="s-status" style="font-size:13px;color:#6e6e73;"></div>
</div>
<div id="results"></div>
<iframe id="ui-iframe" src="index.html" style="position:absolute;left:-9999px;width:1280px;height:800px;border:none;" sandbox="allow-scripts allow-same-origin"></iframe>

<script>
// ─── Minimal stubs so helpers can run standalone ───────────────────────────
const _store = {};
const localStorage = { getItem: k => _store[k] ?? null, setItem: (k,v) => _store[k] = v };

const CATEGORIES = {
  100: 'General Auto Repair / Car Items', 200: 'Corvette Items',
  300: "Men's Items", 400: "Women's Items", 500: 'General Household',
  600: 'Framed Artwork or other Artwork to be Hung', 700: 'Baskets / Gift Sets',
  800: 'Gift Certificates', 900: 'Miscellaneous / Other'
};

const DEFAULT_SETTINGS = {
  gmailClientId: '', inboxEmail: 'etccwebsite.auction@gmail.com',
  debugMode: false, startingBidPct: 30, finalBidPct: 150, bidCount: 25,
  squarePct: 2.6, squareFee: 0.10, walkInStart: 1000,
};

const DB = {
  getItems()      { return JSON.parse(localStorage.getItem('sam_items')    || '[]'); },
  saveItems(v)    { localStorage.setItem('sam_items', JSON.stringify(v)); },
  getSettings()   { return Object.assign({}, DEFAULT_SETTINGS, JSON.parse(localStorage.getItem('sam_settings') || '{}')); },
  saveSettings(v) { localStorage.setItem('sam_settings', JSON.stringify(v)); },
  getFieldMap()   { return JSON.parse(localStorage.getItem('sam_fieldmap') || 'null') || DEFAULT_FIELD_MAP; },
  saveFieldMap(v) { localStorage.setItem('sam_fieldmap', JSON.stringify(v)); },
  getBidders()    { return JSON.parse(localStorage.getItem('sam_bidders')  || '[]'); },
  saveBidders(v)  { localStorage.setItem('sam_bidders',  JSON.stringify(v)); },
  getWinners()    { return JSON.parse(localStorage.getItem('sam_winners')  || '{}'); },
  saveWinners(v)  { localStorage.setItem('sam_winners',  JSON.stringify(v)); },
  getPayments()   { return JSON.parse(localStorage.getItem('sam_payments') || '{}'); },
  savePayments(v) { localStorage.setItem('sam_payments', JSON.stringify(v)); },
};

const Bidders = {
  getAll()   { return DB.getBidders(); },
  save(list) { DB.saveBidders(list); },
  nextNumber() {
    const list = DB.getBidders();
    const walkInStart = DB.getSettings().walkInStart ?? 1000;
    if (!list.length) return walkInStart;
    return Math.max(...list.map(b => parseInt(b.bidder_number, 10) || 0)) + 1;
  },
  add(b)    { const list = DB.getBidders(); list.push(b); DB.saveBidders(list); },
  remove(n) { DB.saveBidders(DB.getBidders().filter(b => b.bidder_number !== n)); },
  clear()   { DB.saveBidders([]); },
};

function fmtPhone(raw) {
  const d = String(raw || '').replace(/\D/g, '');
  if (d.length === 10) return `(${d.slice(0,3)}) ${d.slice(3,6)}-${d.slice(6)}`;
  if (d.length === 11 && d[0] === '1') return `+1 (${d.slice(1,4)}) ${d.slice(4,7)}-${d.slice(7)}`;
  return raw || '';
}

const DEFAULT_FIELD_MAP = [
  { label: 'Category',        selectBy: 'Next Line',             column: 'category'        },
  { label: 'Description',     selectBy: 'Next Line',             column: 'description'     },
  { label: 'Value',           selectBy: 'Next Line',             column: 'value'           },
  { label: 'Reserve',         selectBy: 'Next Line',             column: 'reserve_amount'  },
  { label: 'Donor Name',      selectBy: 'Next Line',             column: 'donor_name'      },
  { label: 'Status',          selectBy: 'Current Line to End',   column: 'status'          },
  { label: 'ItemCategory',    selectBy: 'Current Line to End',   column: 'item_category'   },
  { label: 'ItemValue',       selectBy: 'Current Line to End',   column: 'item_value'      },
];

const Items = {
  getAll()          { return DB.getItems(); },
  existsByMsgId(id) { return DB.getItems().some(i => i.email_message_id === id); },
  nextItemNumber(categoryCode) {
    const items = DB.getItems();
    const code   = String(categoryCode || '0');
    const prefix = code + '-';
    let max = 0;
    items.forEach(i => {
      const num = String(i.item_number || '');
      if (num.startsWith(prefix)) {
        const seq = parseInt(num.substring(prefix.length), 10);
        if (!isNaN(seq) && seq > max) max = seq;
      }
    });
    return `${code}-${max + 1}`;
  },
  add(item) { const items = DB.getItems(); items.push(item); DB.saveItems(items); },
  clear()   { DB.saveItems([]); },
};

function escHtml(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtDollar(val) {
  const n = parseFloat(String(val ?? '').replace(/[$,]/g, ''));
  if (isNaN(n)) return escHtml(val || '');
  return '$' + n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function categoryFromValue(val) {
  if (!val) return null;
  const num = parseInt(String(val).replace(/\D/g, ''), 10);
  if (!isNaN(num) && CATEGORIES[Math.floor(num / 100) * 100]) return Math.floor(num / 100) * 100;
  for (const [code, name] of Object.entries(CATEGORIES)) {
    if (name.toLowerCase().includes(String(val).toLowerCase())) return parseInt(code, 10);
  }
  return null;
}

function parseEmailBody(body, fieldMap) {
  const result   = {};
  const errors   = [];
  const rawLines = body.replace(/\r/g, '').split('\n');
  fieldMap.forEach(({ label, column, selectBy }) => {
    const searchLower = label.trim().toLowerCase();
    const mode        = selectBy || 'Next Line';
    let foundLineIdx = -1, valueStart = -1;
    for (let i = 0; i < rawLines.length; i++) {
      const lineLower  = rawLines[i].toLowerCase();
      const withColon  = searchLower + ':';
      let pos = lineLower.indexOf(withColon);
      if (pos !== -1) { foundLineIdx = i; valueStart = pos + withColon.length; break; }
      pos = lineLower.indexOf(searchLower);
      if (pos !== -1) {
        foundLineIdx = i; valueStart = pos + searchLower.length;
        const rest = rawLines[i].substring(valueStart).trimStart();
        if (rest.startsWith(':')) valueStart = rawLines[i].indexOf(':', valueStart) + 1;
        break;
      }
    }
    if (foundLineIdx === -1) { errors.push(`"${label}" not found`); return; }
    const line = rawLines[foundLineIdx];
    if      (mode === 'Next Line')             result[column] = (rawLines[foundLineIdx + 1] || '').trim();
    else if (mode === 'Current Line to End')   result[column] = line.substring(valueStart).trim();
    else if (mode === 'Current Line to Comma') { const seg = line.substring(valueStart).trim(); const ci = seg.indexOf(','); result[column] = ci !== -1 ? seg.substring(0, ci).trim() : seg; }
    else result[column] = line.substring(valueStart).trim();
  });
  result._parseErrors = errors;
  return result;
}

// ─── Test Runner ──────────────────────────────────────────────────────────
let passCount = 0, failCount = 0;

function assert(name, condition, detail = '') {
  return { name, pass: !!condition, detail: detail || (condition ? '' : 'Assertion failed') };
}

function assertEqual(name, actual, expected) {
  const pass = JSON.stringify(actual) === JSON.stringify(expected);
  return { name, pass, detail: pass ? '' : `Expected: ${JSON.stringify(expected)}  Got: ${JSON.stringify(actual)}` };
}

function renderSuite(title, tests) {
  const passed = tests.filter(t => t.pass).length;
  const div = document.createElement('div');
  div.className = 'suite';
  div.innerHTML = `
    <div class="suite-header">
      <span>${escHtml(title)}</span>
      <span style="color:${passed===tests.length?'#1a7f37':'#c62828'}">${passed}/${tests.length}</span>
    </div>
    ${tests.map(t => `
      <div class="test ${t.pass?'pass':'fail'}">
        <span class="icon"></span>
        <div class="test-name">
          ${escHtml(t.name)}
          ${t.detail ? `<div class="test-detail">${escHtml(t.detail)}</div>` : ''}
        </div>
      </div>`).join('')}
  `;
  document.getElementById('results').appendChild(div);
  passCount += passed;
  failCount += tests.length - passed;
}

function runAll() {
  passCount = 0; failCount = 0;
  document.getElementById('results').innerHTML = '';

  // Reset storage between suites
  _store['sam_items'] = null;

  // ── 1. escHtml ──────────────────────────────────────────────────────────
  renderSuite('escHtml', [
    assertEqual('escapes &',        escHtml('a & b'),       'a &amp; b'),
    assertEqual('escapes <',        escHtml('<div>'),        '&lt;div&gt;'),
    assertEqual('escapes "',        escHtml('"hi"'),         '&quot;hi&quot;'),
    assertEqual('handles null',     escHtml(null),           ''),
    assertEqual('handles number',   escHtml(42),             '42'),
  ]);

  // ── 2. fmtDollar ────────────────────────────────────────────────────────
  renderSuite('fmtDollar', [
    assertEqual('integer value',    fmtDollar(25),           '$25.00'),
    assertEqual('string dollar',    fmtDollar('$1,250.00'),  '$1,250.00'),
    assertEqual('decimal value',    fmtDollar(9.5),          '$9.50'),
    assertEqual('zero',             fmtDollar(0),            '$0.00'),
    assertEqual('empty string',     fmtDollar(''),           ''),
  ]);

  // ── 3. categoryFromValue ─────────────────────────────────────────────────
  renderSuite('categoryFromValue', [
    assertEqual('numeric 200',          categoryFromValue('200'),             200),
    assertEqual('numeric 900',          categoryFromValue('900'),             900),
    assertEqual('name match Corvette',  categoryFromValue('Corvette Items'),  200),
    assertEqual('name match Gift Cert', categoryFromValue('Gift Certificates'), 800),
    assertEqual('null on empty',        categoryFromValue(''),                null),
    assertEqual('null on unknown',      categoryFromValue('Fictional Category'), null),
  ]);

  // ── 4. parseEmailBody — Next Line ────────────────────────────────────────
  const body1 = `Category:\n200 Corvette Items\nDescription:\n1991 Dealer Brochure\nValue:\n$25.00`;
  const fm1 = [
    { label: 'Category',    selectBy: 'Next Line', column: 'category'    },
    { label: 'Description', selectBy: 'Next Line', column: 'description' },
    { label: 'Value',       selectBy: 'Next Line', column: 'value'       },
  ];
  const r1 = parseEmailBody(body1, fm1);
  renderSuite('parseEmailBody — Next Line', [
    assertEqual('category',    r1.category,    '200 Corvette Items'),
    assertEqual('description', r1.description, '1991 Dealer Brochure'),
    assertEqual('value',       r1.value,       '$25.00'),
    assertEqual('no errors',   r1._parseErrors.length, 0),
  ]);

  // ── 5. parseEmailBody — Current Line to End ──────────────────────────────
  const body2 = `Status: Approved\nItemCategory: 200 Corvette Items\nItemValue: $50.00`;
  const fm2 = [
    { label: 'Status',       selectBy: 'Current Line to End', column: 'status'        },
    { label: 'ItemCategory', selectBy: 'Current Line to End', column: 'item_category' },
    { label: 'ItemValue',    selectBy: 'Current Line to End', column: 'item_value'    },
  ];
  const r2 = parseEmailBody(body2, fm2);
  renderSuite('parseEmailBody — Current Line to End', [
    assertEqual('status',        r2.status,        'Approved'),
    assertEqual('item_category', r2.item_category, '200 Corvette Items'),
    assertEqual('item_value',    r2.item_value,    '$50.00'),
    assertEqual('no errors',     r2._parseErrors.length, 0),
  ]);

  // ── 6. parseEmailBody — Current Line to Comma ────────────────────────────
  const body3 = `ItemCategory: 200 Corvette Items, Extra Text`;
  const fm3 = [{ label: 'ItemCategory', selectBy: 'Current Line to Comma', column: 'item_category' }];
  const r3 = parseEmailBody(body3, fm3);
  renderSuite('parseEmailBody — Current Line to Comma', [
    assertEqual('stops at comma', r3.item_category, '200 Corvette Items'),
  ]);

  // ── 7. parseEmailBody — missing field error ───────────────────────────────
  const r4 = parseEmailBody('Nothing here', [{ label: 'Category', selectBy: 'Next Line', column: 'category' }]);
  renderSuite('parseEmailBody — missing field', [
    assert('error reported',   r4._parseErrors.length === 1),
    assert('error names field', r4._parseErrors[0].includes('Category')),
  ]);

  // ── 8. Items.nextItemNumber ───────────────────────────────────────────────
  Items.clear();
  renderSuite('Items.nextItemNumber — empty store', [
    assertEqual('200 starts at 200-1', Items.nextItemNumber(200), '200-1'),
    assertEqual('900 starts at 900-1', Items.nextItemNumber(900), '900-1'),
  ]);

  Items.clear();
  Items.add({ item_number: '200-1' });
  Items.add({ item_number: '200-3' });
  Items.add({ item_number: '900-1' });
  renderSuite('Items.nextItemNumber — with existing items', [
    assertEqual('200 next is 200-4', Items.nextItemNumber(200), '200-4'),
    assertEqual('900 next is 900-2', Items.nextItemNumber(900), '900-2'),
    assertEqual('100 starts at 100-1', Items.nextItemNumber(100), '100-1'),
  ]);

  // ── 9. DB settings defaults ───────────────────────────────────────────────
  _store['sam_settings'] = null;
  const s = DB.getSettings();
  renderSuite('DEFAULT_SETTINGS', [
    assertEqual('startingBidPct default 30',  s.startingBidPct, 30),
    assertEqual('finalBidPct default 150',    s.finalBidPct,    150),
    assertEqual('bidCount default 25',        s.bidCount,       25),
    assertEqual('inboxEmail default',         s.inboxEmail,     'etccwebsite.auction@gmail.com'),
    assertEqual('debugMode default false',    s.debugMode,      false),
  ]);

  // ── 10. Settings round-trip ───────────────────────────────────────────────
  const saved = { gmailClientId: 'abc', inboxEmail: 'test@test.com', debugMode: true, startingBidPct: 25, finalBidPct: 200, bidCount: 30 };
  DB.saveSettings(saved);
  const loaded = DB.getSettings();
  renderSuite('Settings save/load round-trip', [
    assertEqual('startingBidPct', loaded.startingBidPct, 25),
    assertEqual('finalBidPct',    loaded.finalBidPct,    200),
    assertEqual('bidCount',       loaded.bidCount,       30),
    assertEqual('gmailClientId',  loaded.gmailClientId,  'abc'),
    assertEqual('debugMode',      loaded.debugMode,      true),
  ]);

  // ── 11. Bid calculation ───────────────────────────────────────────────────
  function calcBids(itemValue, startPct, finalPct, count) {
    const first = Math.round(itemValue * (startPct / 100) * 100) / 100;
    const last  = Math.round(itemValue * (finalPct  / 100) * 100) / 100;
    const inc   = count > 1 ? (last - first) / (count - 1) : 0;
    return Array.from({ length: count }, (_, i) => Math.round((first + inc * i) * 100) / 100);
  }
  const bids100 = calcBids(100, 30, 150, 5);
  renderSuite('Bid calculation', [
    assertEqual('first bid = 30% of $100',  bids100[0],  30),
    assertEqual('last bid  = 150% of $100', bids100[4],  150),
    assert('bids are ascending', bids100.every((v, i) => i === 0 || v > bids100[i - 1])),
    assertEqual('correct count', bids100.length, 5),
    assertEqual('first bid $25 item (30%)', calcBids(25, 30, 150, 1)[0], 7.5),
  ]);

  // ── 12. Items.add / existsByMsgId / clear ────────────────────────────────
  Items.clear();
  Items.add({ item_number: '200-1', email_message_id: 'msg-abc' });
  Items.add({ item_number: '200-2', email_message_id: 'msg-def' });
  renderSuite('Items.add / existsByMsgId / clear', [
    assert('finds existing msg id',     Items.existsByMsgId('msg-abc')),
    assert('returns false for unknown', !Items.existsByMsgId('msg-xyz')),
    assertEqual('item count after 2 adds', Items.getAll().length, 2),
  ]);
  Items.clear();
  renderSuite('Items.clear', [
    assertEqual('count is 0 after clear', Items.getAll().length, 0),
    assert('existsByMsgId false after clear', !Items.existsByMsgId('msg-abc')),
  ]);

  // ── 13. DB.getFieldMap defaults + round-trip ─────────────────────────────
  _store['sam_fieldmap'] = null;
  const fm = DB.getFieldMap();
  renderSuite('DB.getFieldMap — defaults', [
    assert('returns array',              Array.isArray(fm)),
    assert('has entries',               fm.length > 0),
    assertEqual('first label',          fm[0].label,    'Category'),
    assertEqual('first selectBy',       fm[0].selectBy, 'Next Line'),
    assertEqual('first column',         fm[0].column,   'category'),
  ]);
  const customMap = [{ label: 'TestLabel', selectBy: 'Current Line to End', column: 'test_col' }];
  DB.saveFieldMap(customMap);
  const fmLoaded = DB.getFieldMap();
  renderSuite('DB.getFieldMap — save/load round-trip', [
    assertEqual('length preserved',     fmLoaded.length,          1),
    assertEqual('label preserved',      fmLoaded[0].label,        'TestLabel'),
    assertEqual('selectBy preserved',   fmLoaded[0].selectBy,     'Current Line to End'),
    assertEqual('column preserved',     fmLoaded[0].column,       'test_col'),
  ]);
  _store['sam_fieldmap'] = null; // restore

  // ── 14. parseEmailBody — bare label (no colon) ────────────────────────────
  const body5 = `Category\n200 Corvette Items\nDescription\n1991 Brochure`;
  const fm5 = [
    { label: 'Category',    selectBy: 'Next Line', column: 'category'    },
    { label: 'Description', selectBy: 'Next Line', column: 'description' },
  ];
  const r5 = parseEmailBody(body5, fm5);
  renderSuite('parseEmailBody — bare label (no colon)', [
    assertEqual('category extracted',    r5.category,    '200 Corvette Items'),
    assertEqual('description extracted', r5.description, '1991 Brochure'),
    assertEqual('no errors',             r5._parseErrors.length, 0),
  ]);

  // ── 15. parseEmailBody — CRLF normalization ───────────────────────────────
  const body6 = `Category:\r\n200 Corvette Items\r\nValue:\r\n$25.00`;
  const fm6 = [
    { label: 'Category', selectBy: 'Next Line', column: 'category' },
    { label: 'Value',    selectBy: 'Next Line', column: 'value'    },
  ];
  const r6 = parseEmailBody(body6, fm6);
  renderSuite('parseEmailBody — CRLF line endings', [
    assertEqual('category with CRLF', r6.category, '200 Corvette Items'),
    assertEqual('value with CRLF',    r6.value,    '$25.00'),
    assertEqual('no errors',          r6._parseErrors.length, 0),
  ]);

  // ── 16. categoryFromValue — embedded numeric code ─────────────────────────
  renderSuite('categoryFromValue — embedded codes', [
    assertEqual('200 from "200 Corvette Items"', categoryFromValue('200 Corvette Items'), 200),
    assertEqual('900 from "900 Misc"',           categoryFromValue('900 Misc'),           900),
    assertEqual('100 from "100"',                categoryFromValue('100'),                100),
    assertEqual('null from "0"',                 categoryFromValue('0'),                  null),
  ]);

  // ── 17. Bid calculation — edge cases ─────────────────────────────────────
  function calcBids(itemValue, startPct, finalPct, count) {
    const first = Math.round(itemValue * (startPct / 100) * 100) / 100;
    const last  = Math.round(itemValue * (finalPct  / 100) * 100) / 100;
    const inc   = count > 1 ? (last - first) / (count - 1) : 0;
    return Array.from({ length: count }, (_, i) => Math.round((first + inc * i) * 100) / 100);
  }
  const bids1 = calcBids(100, 30, 150, 1);
  const bids0val = calcBids(0, 30, 150, 5);
  const bids25 = calcBids(100, 30, 150, 25);
  renderSuite('Bid calculation — edge cases', [
    assertEqual('bidCount=1 returns first bid only',    bids1.length, 1),
    assertEqual('bidCount=1 value is startPct',         bids1[0], 30),
    assertEqual('zero item value gives all zeros',      bids0val[0], 0),
    assertEqual('zero item value last bid is zero',     bids0val[4], 0),
    assertEqual('bidCount=25 correct length',           bids25.length, 25),
    assertEqual('bidCount=25 first bid',                bids25[0], 30),
    assertEqual('bidCount=25 last bid',                 bids25[24], 150),
    assert('bidCount=25 all ascending',                 bids25.every((v, i) => i === 0 || v >= bids25[i - 1])),
  ]);

  // ── 18. fmtPhone ─────────────────────────────────────────────────────────
  renderSuite('fmtPhone', [
    assertEqual('10 digits',          fmtPhone('5551234567'),       '(555) 123-4567'),
    assertEqual('dashes input',       fmtPhone('555-123-4567'),     '(555) 123-4567'),
    assertEqual('parens input',       fmtPhone('(555) 123-4567'),   '(555) 123-4567'),
    assertEqual('11 digits with 1',   fmtPhone('15551234567'),      '+1 (555) 123-4567'),
    assertEqual('empty string',       fmtPhone(''),                 ''),
    assertEqual('null',               fmtPhone(null),               ''),
    assertEqual('non-numeric passes through', fmtPhone('ext 123'), 'ext 123'),
  ]);

  // ── 19. Bidders CRUD ─────────────────────────────────────────────────────
  _store['sam_bidders'] = null;
  Bidders.clear();
  renderSuite('Bidders — empty store', [
    assertEqual('getAll returns []',      Bidders.getAll().length, 0),
    assertEqual('nextNumber starts at walkInStart (1000)', Bidders.nextNumber(), 1000),
  ]);

  Bidders.add({ bidder_number: 1, last_name: 'Smith', first_name: 'John', email: 'j@t.com', phone: '' });
  Bidders.add({ bidder_number: 2, last_name: 'Jones', first_name: 'Sue',  email: 's@t.com', phone: '' });
  renderSuite('Bidders — add / getAll', [
    assertEqual('count after 2 adds',     Bidders.getAll().length,          2),
    assertEqual('first last_name',        Bidders.getAll()[0].last_name,    'Smith'),
    assertEqual('second first_name',      Bidders.getAll()[1].first_name,   'Sue'),
    assertEqual('nextNumber after 2',     Bidders.nextNumber(),              3),
  ]);

  Bidders.remove(1);
  renderSuite('Bidders — remove', [
    assertEqual('count after remove',     Bidders.getAll().length,          1),
    assertEqual('remaining is #2',        Bidders.getAll()[0].bidder_number, 2),
    assertEqual('nextNumber after remove', Bidders.nextNumber(),             3),
  ]);

  Bidders.clear();

      const totalBid = wonItems.reduce((s, i) => s + i.bid, 0);
      const ccTrans  = Math.round((totalBid * sqPct + sqFee) * 100) / 100;
      const ccTotal  = Math.round((totalBid + ccTrans) * 100) / 100;
      const amtDue   = method === 'Credit Card' ? ccTotal : totalBid;
      return { totalBid, ccTrans, ccTotal, amtDue };
    }

    const items1 = [{ bid: 50 }, { bid: 30 }];

      assertEqual('ccTotal = totalBid + ccTrans',  r1.ccTotal,  Math.round((80 + r1.ccTrans) * 100) / 100),
      assertEqual('amtDue = ccTotal for CC',       r1.amtDue,   r1.ccTotal),
      assertEqual('amtDue = totalBid for Cash',    r2.amtDue,   80),
      assertEqual('single item totalBid',          r3.totalBid, 100),

    ]);
  }

function updateSummary() {
  const total = passCount + failCount;
  document.getElementById('s-pass').textContent  = passCount;
  document.getElementById('s-fail').textContent  = failCount;
  document.getElementById('s-total').textContent = total;
  document.getElementById('s-status').textContent = failCount === 0
    ? `✓ All ${total} tests passed`
    : `${failCount} test${failCount > 1 ? 's' : ''} failed`;
  document.getElementById('s-status').style.color = failCount === 0 ? '#1a7f37' : '#c62828';
}

// ── UI test helpers ───────────────────────────────────────────────────────────
function uiAssert(name, condition, detail) {
  return { name, pass: !!condition, detail: detail || (condition ? '' : 'Condition false') };
}

function uiCheck(d, name, selector, expectedText) {
  const el = d.querySelector(selector);
  if (!el) return { name, pass: false, detail: `Not found: ${selector}` };
  if (expectedText !== undefined) {
    const actual = el.textContent.trim();
    const pass = actual.includes(expectedText);
    return { name, pass, detail: pass ? '' : `Expected "${expectedText}" in "${actual.slice(0,60)}"` };
  }
  return { name, pass: true, detail: '' };
}

function uiCount(d, name, selector, min) {
  const count = d.querySelectorAll(selector).length;
  return { name, pass: count >= min, detail: count >= min ? '' : `Found ${count}, expected ≥${min}` };
}

function uiAnyContains(d, name, selector, text) {
  const found = [...d.querySelectorAll(selector)].some(el => el.textContent.includes(text));
  return { name, pass: found, detail: found ? '' : `No "${selector}" contains "${text}"` };
}

        uiCheck(d, 'modal table present',       '#member-db-modal-table'),
        uiAnyContains(d, 'Add to Bidders button', '#member-db-modal button', 'Add to Bidders'),
        uiAnyContains(d, 'Select All button',    '#member-db-modal button', 'Select All'),
        uiAnyContains(d, 'Clear All button',     '#member-db-modal button', 'Clear All'),
        uiCheck(d, 'search box present',        '#member-search'),
      ]);
      // Close modal
      try { d.getElementById('member-db-modal').style.display = 'none'; } catch(e) {}

      // ── Edit bidder modal opens ───────────────────────────────────────────
      nav('bidder-reg');
      await delay(60);
      try {
        w.localStorage.setItem('sam_bidders', JSON.stringify([
          { bidder_number: 1001, last_name: 'TestLast', first_name: 'TestFirst', email: '', phone: '', bidder_type: 'walk-in' }
        ]));
        w.refreshBiddersTable();
        await delay(60);
        const editBtn = d.querySelector('#bidders-tbody button[data-edit]');
        if (editBtn) editBtn.click();
        await delay(60);
        const modal = d.getElementById('bidder-edit-modal');
        const modalOpen = modal && modal.style.display === 'flex';
        const numVal   = d.getElementById('edit-bidder-num')?.value;
        await suite('Edit bidder modal', () => [
          uiAssert('Edit button present in row',  !!editBtn,   'No button[data-edit] found in bidders-tbody'),
          uiAssert('Modal opens on Edit click',   modalOpen,   'bidder-edit-modal not visible after click'),
          uiAssert('Modal populated with bidder', numVal === '1001', `edit-bidder-num = "${numVal}"`),
        ]);
        if (modal) modal.style.display = 'none';
        w.localStorage.removeItem('sam_bidders');
        w.refreshBiddersTable();
      } catch(e) {
        renderSuite('UI — Edit bidder modal', [{ name: 'edit modal test', pass: false, detail: e.message }]);
        updateSummary();
      }

      // ── Member search filter ───────────────────────────────────────────────
      nav('bidder-reg');
      await delay(60);
      // Seed two members directly into the app's DB
      try {
        w.localStorage.setItem('sam_members', JSON.stringify([
          { member_number: '1', last_name: 'Adams',  first_name: 'Alice', primary_email: '', cell_phone: '' },
          { member_number: '2', last_name: 'Baker',  first_name: 'Bob',   primary_email: '', cell_phone: '' },
          { member_number: '3', last_name: 'Clarke', first_name: 'Carol', primary_email: '', cell_phone: '' },
        ]));
        w.showMemberDBModal();
        await delay(80);
        w.filterMemberTable('b');
        await delay(30);
        const rows = d.querySelectorAll('#member-db-modal-tbody tr');
        const visible = [...rows].filter(r => r.style.display !== 'none');
        await suite('Member search filter', () => [
          uiAssert('3 rows total seeded',   rows.length === 3,   `Got ${rows.length} rows`),
          uiAssert('1 row visible for "b"', visible.length === 1, `Got ${visible.length} visible`),
          uiAssert('visible row is Baker',  visible[0]?.cells[2]?.textContent.trim() === 'Baker', 'Wrong row visible'),
        ]);
        d.getElementById('member-db-modal').style.display = 'none';
      } catch(e) {
        renderSuite('UI — Member search filter', [{ name: 'filter test', pass: false, detail: e.message }]);
        updateSummary();
      }

      // ── Add to bidders uses member_number as bidder_number ─────────────────
      try {
        w.localStorage.setItem('sam_bidders', JSON.stringify([]));
        w.localStorage.setItem('sam_members', JSON.stringify([
          { member_number: '42',  last_name: 'Doe',   first_name: 'Jane', primary_email: 'j@t.com', cell_phone: '555-0001' },
          { member_number: '101', last_name: 'Smith',  first_name: 'Bob',  primary_email: 'b@t.com', cell_phone: '555-0002' },
        ]));
        w.showMemberDBModal();
        await delay(80);
        // Check all checkboxes
        d.querySelectorAll('#member-db-modal-table tbody input[type="checkbox"]').forEach(cb => cb.checked = true);
        w.addCheckedToWalkins();
        await delay(60);
        const bidders = JSON.parse(w.localStorage.getItem('sam_bidders') || '[]');
        const b42  = bidders.find(b => b.bidder_number === 42);
        const b101 = bidders.find(b => b.bidder_number === 101);
        await suite('Add to bidders uses member_number', () => [
          uiAssert('2 bidders added',            bidders.length === 2,        `Got ${bidders.length}`),
          uiAssert('member 42 bidder_number=42', b42  !== undefined,          'No bidder with number 42'),
          uiAssert('member 101 bidder_number=101', b101 !== undefined,        'No bidder with number 101'),
          uiAssert('bidder_type is member',      b42?.bidder_type === 'member', `Got ${b42?.bidder_type}`),
          uiAssert('last_name preserved',        b42?.last_name === 'Doe',    `Got ${b42?.last_name}`),
        ]);
        d.getElementById('member-db-modal').style.display = 'none';
        w.localStorage.setItem('sam_bidders', JSON.stringify([]));
      } catch(e) {
        renderSuite('UI — Add to bidders uses member_number', [{ name: 'add test', pass: false, detail: e.message }]);
        updateSummary();
      }

      // ── Member DB — Select All / Clear All buttons ─────────────────────────
      try {
        w.localStorage.setItem('sam_members', JSON.stringify([
          { member_number: '1', last_name: 'Alpha', first_name: 'A', primary_email: '', cell_phone: '' },
          { member_number: '2', last_name: 'Beta',  first_name: 'B', primary_email: '', cell_phone: '' },
        ]));
        w.showMemberDBModal();
        await delay(80);
        // Click Select All
        const selAllBtn = [...d.querySelectorAll('#member-db-modal button')].find(b => b.textContent.trim() === 'Select All');
        if (selAllBtn) selAllBtn.click();
        await delay(30);
        const allChecked = [...d.querySelectorAll('#member-db-modal-tbody input[type="checkbox"]')].every(cb => cb.checked);
        // Click Clear All
        const clrAllBtn = [...d.querySelectorAll('#member-db-modal button')].find(b => b.textContent.trim() === 'Clear All');
        if (clrAllBtn) clrAllBtn.click();
        await delay(30);
        const allUnchecked = [...d.querySelectorAll('#member-db-modal-tbody input[type="checkbox"]')].every(cb => !cb.checked);
        await suite('Member DB — Select All / Clear All', () => [
          uiAssert('Select All button found',     !!selAllBtn,  'No Select All button in modal'),
          uiAssert('Select All checks all rows',  allChecked,   'Not all checkboxes checked after Select All'),
          uiAssert('Clear All button found',      !!clrAllBtn,  'No Clear All button in modal'),
          uiAssert('Clear All unchecks all rows', allUnchecked, 'Not all checkboxes unchecked after Clear All'),
        ]);
        d.getElementById('member-db-modal').style.display = 'none';
        w.localStorage.removeItem('sam_members');
      } catch(e) {
        renderSuite('UI — Member DB — Select All / Clear All', [{ name: 'select/clear test', pass: false, detail: e.message }]);
        updateSummary();
      }

      // ── Register Bidders — Add Bidder button ───────────────────────────────
      try {
        nav('bidder-reg');
        await delay(80);
        w.localStorage.setItem('sam_bidders', JSON.stringify([]));
        w.refreshBiddersTable();
        await delay(40);
        const addBtn = [...d.querySelectorAll('#bidders-action-bar button')].find(b => b.textContent.includes('Add Bidder'));
        if (addBtn) addBtn.click();
        await delay(40);
        const newRow = d.querySelector('#bidders-tbody tr.new-bidder-row');
        const saveInRow   = newRow ? newRow.querySelector('.nb-save')   : null;
        const cancelInRow = newRow ? newRow.querySelector('.nb-cancel') : null;
        await suite('Register Bidders — Add Bidder button', () => [
          uiAssert('Add Bidder button found',     !!addBtn,      'No Add Bidder button in action bar'),
          uiAssert('New row appears in table',    !!newRow,      'No new-bidder-row in tbody'),
          uiAssert('Save button in new row',      !!saveInRow,   'No .nb-save in new row'),
          uiAssert('Cancel button in new row',    !!cancelInRow, 'No .nb-cancel in new row'),
        ]);
        // Click Cancel — row should disappear
        if (cancelInRow) cancelInRow.click();
        await delay(30);
        const rowGone = !d.querySelector('#bidders-tbody tr.new-bidder-row');
        await suite('Register Bidders — Cancel new bidder row', () => [
          uiAssert('Cancel removes the new row',  rowGone, 'new-bidder-row still present after Cancel'),
        ]);
        w.localStorage.removeItem('sam_bidders');
      } catch(e) {
        renderSuite('UI — Register Bidders — Add Bidder button', [{ name: 'add bidder test', pass: false, detail: e.message }]);
        updateSummary();
      }

      // ── Register Bidders — Delete bidder button ────────────────────────────
      try {
        nav('bidder-reg');
        await delay(80);
        w.localStorage.setItem('sam_bidders', JSON.stringify([
          { bidder_number: 55, last_name: 'Del', first_name: 'Me', email: 'd@t.com', phone: '', bidder_type: 'walk-in' }
        ]));
        w.refreshBiddersTable();
        await delay(40);
        const orig = w.confirm;
        w.confirm = () => true;
        const delBtn = d.querySelector('#bidders-tbody button.btn.danger[data-num]');
        if (delBtn) delBtn.click();
        await delay(40);
        w.confirm = orig;
        const remaining = JSON.parse(w.localStorage.getItem('sam_bidders') || '[]');
        await suite('Register Bidders — Delete bidder button', () => [
          uiAssert('Delete button found',      !!delBtn,          'No delete button in bidders-tbody'),
          uiAssert('Bidder removed from DB',   remaining.length === 0, `Expected 0 bidders, got ${remaining.length}`),
        ]);
        w.localStorage.removeItem('sam_bidders');
      } catch(e) {
        renderSuite('UI — Register Bidders — Delete bidder button', [{ name: 'delete bidder test', pass: false, detail: e.message }]);
        updateSummary();
      }

      // ── Bidder Edit modal — Cancel button ──────────────────────────────────
      try {
        nav('bidder-reg');
        await delay(80);
        w.localStorage.setItem('sam_bidders', JSON.stringify([
          { bidder_number: 77, last_name: 'Edit', first_name: 'Me', email: 'e@t.com', phone: '', bidder_type: 'walk-in' }
        ]));
        w.refreshBiddersTable();
        await delay(40);
        const editBtn = d.querySelector('#bidders-tbody button[data-edit]');
        if (editBtn) editBtn.click();
        await delay(40);
        const cancelEditBtn = [...d.querySelectorAll('#bidder-edit-modal button')].find(b => b.textContent.trim() === 'Cancel');
        if (cancelEditBtn) cancelEditBtn.click();
        await delay(30);
        const modalClosed = d.getElementById('bidder-edit-modal')?.style.display === 'none';
        await suite('Bidder Edit modal — Cancel button', () => [
          uiAssert('Cancel button found in edit modal', !!cancelEditBtn, 'No Cancel button in bidder-edit-modal'),
          uiAssert('Modal closes after Cancel',         modalClosed,     'bidder-edit-modal still visible after Cancel'),
        ]);
        w.localStorage.removeItem('sam_bidders');
      } catch(e) {
        renderSuite('UI — Bidder Edit modal — Cancel button', [{ name: 'cancel edit test', pass: false, detail: e.message }]);
        updateSummary();
      }

      // ── Load Items — View All (items) button ───────────────────────────────
      try {
        nav('item-load');
        await delay(80);
        const viewAllBtn = [...d.querySelectorAll('#screen-item-load button')].find(b => b.textContent.trim() === 'View All');
        if (viewAllBtn) viewAllBtn.click();
        await delay(40);
        const modalVisible = d.getElementById('view-all-modal')?.style.display !== 'none';
        await suite('Load Items — View All button', () => [
          uiAssert('View All button found',     !!viewAllBtn,  'No View All button on Load Items screen'),
          uiAssert('View All modal opens',      modalVisible,  'view-all-modal not visible after click'),
        ]);
        w.closeViewAll();
        await delay(20);
      } catch(e) {
        renderSuite('UI — Load Items — View All button', [{ name: 'view all test', pass: false, detail: e.message }]);
        updateSummary();
      }

      // ── Load Items — View Categories button ────────────────────────────────
      try {
        nav('item-load');
        await delay(60);
        const catBtn = [...d.querySelectorAll('#screen-item-load button')].find(b => b.textContent.trim() === 'View Categories');
        if (catBtn) catBtn.click();
        await delay(40);
        const catModal = d.getElementById('cat-modal');
        const catVisible = catModal && catModal.style.display !== 'none';
        await suite('Load Items — View Categories button', () => [
          uiAssert('View Categories button found',  !!catBtn,    'No View Categories button on Load Items screen'),
          uiAssert('Categories modal opens',        catVisible,  'cat-modal not visible after click'),
        ]);
        if (catModal) catModal.style.display = 'none';
      } catch(e) {
        renderSuite('UI — Load Items — View Categories button', [{ name: 'view categories test', pass: false, detail: e.message }]);
        updateSummary();
      }

      // ── Bid Sheets — Check All / Clear All buttons ─────────────────────────
      try {
        nav('bidding-sheets');
        await delay(80);
        w.localStorage.setItem('sam_items', JSON.stringify([
          { item_number: '200-1', description: 'Test Item', category_name: 'Corvette Items', category_code: '200', value: '$50', reserve_amount: '', donor_name: 'Donor' }
        ]));
        w.refreshBSTable && w.refreshBSTable();
        await delay(60);
        const checkAllBtn = [...d.querySelectorAll('#bs-toolbar-wrap button, #screen-bidding-sheets button')].find(b => b.textContent.trim() === 'Check All');
        if (checkAllBtn) checkAllBtn.click();
        await delay(30);
        const allBsChecked = [...d.querySelectorAll('#bs-items-tbody .bs-chk')].every(cb => cb.checked);
        const clearAllBtn = [...d.querySelectorAll('#bs-toolbar-wrap button, #screen-bidding-sheets button')].find(b => b.textContent.trim() === 'Clear All');
        if (clearAllBtn) clearAllBtn.click();
        await delay(30);
        const allBsUnchecked = [...d.querySelectorAll('#bs-items-tbody .bs-chk')].every(cb => !cb.checked);
        await suite('Bid Sheets — Check All / Clear All', () => [
          uiAssert('Check All button found',       !!checkAllBtn,   'No Check All button on Bid Sheets screen'),
          uiAssert('Check All checks all items',   allBsChecked,    'Not all bs-chk checked after Check All'),
          uiAssert('Clear All button found',       !!clearAllBtn,   'No Clear All button on Bid Sheets screen'),
          uiAssert('Clear All unchecks all items', allBsUnchecked,  'Not all bs-chk unchecked after Clear All'),
        ]);
        w.localStorage.removeItem('sam_items');
      } catch(e) {
        renderSuite('UI — Bid Sheets — Check All / Clear All', [{ name: 'check/clear test', pass: false, detail: e.message }]);
        updateSummary();
      }

      // ── Auction Close — Save button ────────────────────────────────────────
      try {
        nav('auction-close');
        await delay(80);
        const saveWinnersBtn = [...d.querySelectorAll('#winners-toolbar-wrap button, #screen-auction-close button')].find(b => b.textContent.trim() === 'Save');
        if (saveWinnersBtn) saveWinnersBtn.click();
        await delay(40);
        const note = d.getElementById('winners-save-note');
        const noteVisible = note && note.textContent.trim() !== '';
        await suite('Auction Close — Save button', () => [
          uiAssert('Save button found on Auction Close', !!saveWinnersBtn, 'No Save button on Auction Close screen'),
          uiAssert('Save note shown after click',        noteVisible,      'winners-save-note empty after Save'),
        ]);
      } catch(e) {
        renderSuite('UI — Auction Close — Save button', [{ name: 'save winners test', pass: false, detail: e.message }]);
        updateSummary();
      }

      // ── Settings — Save Settings button ───────────────────────────────────
      try {
        nav('settings');
        await delay(60);
        const saveSettingsBtn = [...d.querySelectorAll('#screen-settings button')].find(b => b.textContent.trim() === 'Save Settings');
        if (saveSettingsBtn) saveSettingsBtn.click();
        await delay(40);
        const toast = d.getElementById('settings-saved-msg');
        const toastVisible = toast && toast.style.display !== 'none';
        await suite('Settings — Save Settings button', () => [
          uiAssert('Save Settings button found', !!saveSettingsBtn, 'No Save Settings button on Settings screen'),
          uiAssert('Toast appears after save',   toastVisible,      'settings-saved-msg not visible after Save'),
        ]);
      } catch(e) {
        renderSuite('UI — Settings — Save Settings button', [{ name: 'save settings test', pass: false, detail: e.message }]);
        updateSummary();
      }

      // ── Settings — Add Field button ────────────────────────────────────────
      try {
        nav('settings');
        await delay(60);
        const rowsBefore = d.querySelectorAll('#field-map-tbody tr').length;
        const addFieldBtn = d.getElementById('btn-add-field');
        if (addFieldBtn) addFieldBtn.click();
        await delay(40);
        const rowsAfter = d.querySelectorAll('#field-map-tbody tr').length;
        await suite('Settings — Add Field button', () => [
          uiAssert('Add Field button found',      !!addFieldBtn,           'No #btn-add-field on Settings screen'),
          uiAssert('Row added to field map table', rowsAfter === rowsBefore + 1, `Rows before: ${rowsBefore}, after: ${rowsAfter}`),
        ]);
      } catch(e) {
        renderSuite('UI — Settings — Add Field button', [{ name: 'add field test', pass: false, detail: e.message }]);
        updateSummary();
      }

      // ── Settings — Delete Bidders button ───────────────────────────────────
      try {
        nav('settings');
        await delay(60);
        w.localStorage.setItem('sam_bidders', JSON.stringify([
          { bidder_number: 1, last_name: 'A', first_name: 'B', email: '', phone: '', bidder_type: 'walk-in' },
          { bidder_number: 2, last_name: 'C', first_name: 'D', email: '', phone: '', bidder_type: 'member' },
        ]));
        d.getElementById('sel-clear-bidders').value = 'all';
        const orig = w.confirm;
        w.confirm = () => true;
        const delBiddersBtn = [...d.querySelectorAll('#screen-settings button')].find(b => b.textContent.trim() === 'Delete Bidders');
        if (delBiddersBtn) delBiddersBtn.click();
        await delay(40);
        w.confirm = orig;
        const afterDelete = JSON.parse(w.localStorage.getItem('sam_bidders') || '[]');
        const statusMsg = d.getElementById('bidder-db-status')?.textContent;
        await suite('Settings — Delete Bidders button', () => [
          uiAssert('Delete Bidders button found',  !!delBiddersBtn,       'No Delete Bidders button on Settings screen'),
          uiAssert('All bidders cleared from DB',  afterDelete.length === 0, `Expected 0, got ${afterDelete.length}`),
          uiAssert('Status message shown',         statusMsg && statusMsg.includes('removed'), `Status: "${statusMsg}"`),
        ]);
        w.localStorage.removeItem('sam_bidders');
      } catch(e) {
        renderSuite('UI — Settings — Delete Bidders button', [{ name: 'delete bidders test', pass: false, detail: e.message }]);
        updateSummary();
      }

      updateSummary();
      document.getElementById('s-status').textContent +=  ' (incl. UI)';
    })();
  }

  if (iframe.contentDocument?.readyState === 'complete') {
    onReady();
  } else {
    iframe.onload = onReady;
  }
}

window.onload = runAll;
</script>
</body>
</html>
